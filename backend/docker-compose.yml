services:
  postgres:
    image: postgres:17-alpine
    container_name: pg-academic
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: academic-ai-db
    ports:
      - "5432:5432"
    volumes:
      - pg_academic_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-academic
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_academic_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: academic-ai-service-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/academic-ai-db
      CHECKPOINTER_URL: postgresql://postgres:postgres@postgres:5432/academic-ai-db
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_academic_data:
  qdrant_academic_data:
